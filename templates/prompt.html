<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Live2D Galgame - 全局提示词">
    <title>全局提示词 - AI Live2D Galgame</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>

    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Unified Navigation -->
        <nav class="main-nav">
            <a href="/" class="nav-btn">⚙️ API 设置</a>
            <a href="/character" class="nav-btn">🎭 角色设置</a>
            <a href="/prompt" class="nav-btn active">🧠 全局提示词</a>
        </nav>

        <div id="panels-container">
            <!-- 2. System Prompt Panel -->
            <div id="panel-prompt" class="nav-panel active-panel">
                <section class="glass-panel" style="animation-delay: 0.1s">
                    <div class="panel-title">
                        <span class="icon">🧠</span>
                        全局系统提示词 (System Prompt)
                    </div>
                    <div class="form-group">
                        <label for="custom_system_prompt">填写全局设定，可使用 {{char}} 代指角色，{{user}} 代指你的名字。系统将以此作为唯一的系统提示词。</label>
                        <textarea id="custom_system_prompt" rows="6" placeholder="Write {{char}}'s next reply in a fictional chat between {{char}} and {{user}}..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="world_scenario">世界观/场景 (Scenario)</label>
                        <textarea id="world_scenario" rows="3" placeholder="描述当前对话发生的场景和世界观设置..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="user_persona">你的设定 (User Persona)</label>
                        <textarea id="user_persona" rows="3" placeholder="描述你自己的身份、外貌、性格等信息，以便AI更好地与你互动..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="authors_note">深度提示词 / 作者寄语 (Author's Note)</label>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.2rem; margin-bottom: 0.5rem;">高优先级指令，将注入在对话末尾。适合放置如“始终以第三人称描写”、“强调角色心理活动”等强约束规则。</p>
                        <textarea id="authors_note" rows="3" placeholder="例如：Always stay in character. Describe {{char}}'s actions and thoughts in detail."></textarea>
                    </div>
                    <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
                        <button class="btn btn-primary btn-sm" id="btn-save">💾 保存设置</button>
                    </div>
                    <div class="status-msg" id="settings-status"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js?v=4"></script>
</body>

</html>
