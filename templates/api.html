<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Live2D Galgame - API 设置">
    <title>API 设置 - AI Live2D Galgame</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>

    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Unified Navigation -->
        <nav class="main-nav">
            <a href="/" class="nav-btn active">⚙️ API 设置</a>
            <a href="/character" class="nav-btn">🎭 角色设置</a>
            <a href="/prompt" class="nav-btn">🧠 全局提示词</a>
        </nav>

        <div id="panels-container">
            <!-- 1. API Settings Panel -->
            <div id="panel-api" class="nav-panel active-panel">
                <section class="glass-panel" style="animation-delay: 0.1s">
                    <div class="panel-title">
                        <span class="icon">⚙️</span>
                        API 设置
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="api_url">API 地址</label>
                            <input type="text" id="api_url" placeholder="https://api.openai.com" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="api_key">API Key</label>
                            <input type="password" id="api_key" placeholder="sk-..." autocomplete="off">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="model_name">模型名称</label>
                        <input type="text" id="model_name" placeholder="gpt-3.5-turbo / gpt-4 / claude-3-sonnet 等">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="temperature">温度 (Temperature)</label>
                            <input type="number" id="temperature" min="0" max="2" step="0.01" value="1.00">
                        </div>
                        <div class="form-group">
                            <label for="top_p">Top P</label>
                            <input type="number" id="top_p" min="0" max="1" step="0.01" value="1.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="frequency_penalty">频率惩罚 (Frequency Penalty)</label>
                            <input type="number" id="frequency_penalty" min="-2" max="2" step="0.01" value="0.00">
                        </div>
                        <div class="form-group">
                            <label for="presence_penalty">存在惩罚 (Presence Penalty)</label>
                            <input type="number" id="presence_penalty" min="-2" max="2" step="0.01" value="0.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="max_tokens">最大回复长度 (Max Tokens)</label>
                            <input type="number" id="max_tokens" min="10" max="8000" step="10" value="3000">
                        </div>
                        <div class="form-group">
                            <label for="context_size">上下文长度 (Context Length in messages)</label>
                            <input type="number" id="context_size" min="1" max="100" step="1" value="20">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="n_choices">每次生成多个备选回复</label>
                            <input type="number" id="n_choices" min="1" max="5" step="1" value="1">
                        </div>
                        <div class="form-group" style="display:flex; flex-direction:column; justify-content:center; gap:0.5rem">
                            <label style="display:flex; align-items:center; gap:0.5rem">
                                <input type="checkbox" id="stream_output" checked style="width:auto; transform:scale(1.2)"> 流式传输
                            </label>
                            <label style="display:flex; align-items:center; gap:0.5rem">
                                <input type="checkbox" id="request_cot" style="width:auto; transform:scale(1.2)"> 请求思维链
                            </label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reasoning_effort">推理强度 (Reasoning Effort)</label>
                            <select id="reasoning_effort">
                                <option value="auto">自动 (Auto)</option>
                                <option value="low">极低/低 (Low)</option>
                                <option value="medium">中 (Medium)</option>
                                <option value="high">高/极高 (High)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="reply_length_limit">长度限制</label>
                            <select id="reply_length_limit">
                                <option value="auto">自动</option>
                                <option value="low">低</option>
                                <option value="medium">中</option>
                                <option value="high">高</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
                        <button class="btn btn-primary btn-sm" id="btn-save">💾 保存设置</button>
                        <button class="btn btn-secondary btn-sm" id="btn-test">🔌 测试连接</button>
                    </div>
                    <div class="status-msg" id="settings-status"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js?v=4"></script>
</body>

</html>
