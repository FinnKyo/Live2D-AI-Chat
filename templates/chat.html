<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Live2D Galgame - 对话界面">
    <title>AI Live2D Galgame - 对话</title>
    <link rel="stylesheet" href="/static/css/chat.css?v=3">
</head>

<body>

    <div class="game-container">
        <!-- Background -->
        <div class="game-bg"></div>

        <!-- Live2D Canvas -->
        <canvas id="live2d-canvas"></canvas>

        <!-- Model Loading Overlay -->
        <div class="model-loading" id="model-loading">
            <div class="loading-spinner"></div>
            <p>正在加载角色模型...</p>
        </div>

        <!-- Top Bar -->
        <div class="top-bar">
            <span class="char-name-tag" id="char-name-tag">AI 对话</span>
            <div class="top-bar-actions" style="position: relative;">
                <button class="back-btn" id="btn-sessions"
                    style="font-size: 1.2rem; padding: 0.2rem 0.6rem; margin-right: 0.5rem;" title="聊天记录">📜</button>
                <button class="back-btn" id="btn-settings"
                    style="font-size: 1.2rem; padding: 0.2rem 0.6rem;" title="设置">⚙️</button>

                <div id="chat-sessions-panel"
                    style="display:none; position:absolute; top: 100%; right: 0; background: rgba(10,10,35,0.9); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 300px; margin-top: 0.5rem; z-index: 200; max-height: 400px; overflow-y:auto;">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:0.5rem;">
                        <span style="color:white; font-weight:bold;">聊天记录</span>
                        <button class="btn btn-primary btn-sm" id="btn-new-session"
                            style="padding:0.2rem 0.5rem; font-size:0.8rem;">开启新对话</button>
                    </div>
                    <div id="sessions-list" style="display:flex; flex-direction:column; gap:0.5rem;">
                        <!-- Session rows -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Side Drawer -->
        <div class="settings-drawer-overlay" id="settings-overlay"></div>
        <div class="settings-drawer" id="settings-drawer">
            <div class="drawer-header">
                <h3>⚙️ 系统设置</h3>
                <button class="close-drawer" id="close-settings">✕</button>
            </div>
            
            <div class="drawer-tabs">
                <button class="tab-btn active" data-tab="tab-api">API</button>
                <button class="tab-btn" data-tab="tab-prompt">提示词</button>
                <button class="tab-btn" data-tab="tab-display">显示</button>
            </div>

            <div class="drawer-content">
                <!-- API Tab -->
                <div class="tab-panel active" id="tab-api">
                    <div class="form-group">
                        <label for="api_url">API 地址</label>
                        <input type="text" id="api_url" placeholder="https://api.openai.com" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="api_key">API Key</label>
                        <input type="password" id="api_key" placeholder="sk-..." autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="model_name">模型名称</label>
                        <input type="text" id="model_name" placeholder="gpt-3.5-turbo">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="temperature">温度</label>
                            <input type="number" id="temperature" min="0" max="2" step="0.1" value="1.0">
                        </div>
                        <div class="form-group">
                            <label for="max_tokens">最大回复</label>
                            <input type="number" id="max_tokens" min="10" max="8000" step="100" value="3000">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm w-100" id="btn-save-api">💾 保存 API 设置</button>
                    <button class="btn btn-secondary btn-sm w-100 mt-2" id="btn-test-api">🔌 测试连接</button>
                    <div class="status-msg" id="settings-status"></div>
                </div>

                <!-- Prompt Tab -->
                <div class="tab-panel" id="tab-prompt">
                    <div class="form-group">
                        <label for="char_name">角色显示名称</label>
                        <input type="text" id="char_name" placeholder="角色名字...">
                    </div>
                    <div class="form-group">
                        <label for="char_greeting">开场白</label>
                        <textarea id="char_greeting" rows="2" placeholder="角色的第一句话..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="char_persona">角色性格设定 (Persona)</label>
                        <textarea id="char_persona" rows="4" placeholder="例如：性格活泼、爱好学习的 AI 助手..."></textarea>
                    </div>
                    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 1rem 0;">
                    <div class="form-group">
                        <label for="custom_system_prompt">全局系统提示词 (System Prompt)</label>
                        <textarea id="custom_system_prompt" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="world_scenario">世界观/对话场景</label>
                        <textarea id="world_scenario" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="user_persona">你的身份设定</label>
                        <textarea id="user_persona" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="authors_note">深度指令 (Author's Note)</label>
                        <textarea id="authors_note" rows="2"></textarea>
                    </div>
                    <button class="btn btn-primary btn-sm w-100" id="btn-save-prompt">💾 保存所有配置</button>
                    <div class="status-msg" id="prompt-status"></div>
                </div>


                <!-- Display Tab -->
                <div class="tab-panel" id="tab-display">
                    <div class="form-group">
                        <label>背景图片 URL</label>
                        <input type="text" id="chat_background_input" placeholder="https://...">
                    </div>
                    <div class="form-group">
                        <label>对话框透明度 <span id="opacity_val_display">0.75</span></label>
                        <input type="range" id="chat_opacity_slider" min="0" max="1" step="0.05" value="0.75">
                    </div>
                    <div class="form-group">
                        <label>模型缩放 <span id="drawer-size-value" class="size-value">50%</span></label>
                        <input type="range" id="drawer-size-slider" class="size-slider" min="0.3" max="1.5" step="0.05" value="0.5">
                    </div>
                </div>
            </div>
        </div>

        <!-- Size Control Slider -->
        <div class="size-control">
            <label>大小</label>
            <input type="range" class="size-slider" id="main-size-slider" min="0.3" max="1.5" step="0.05" value="0.5">
            <span class="size-value" id="main-size-value">50%</span>
        </div>

        <!-- Dialogue Area (Galgame Style) -->
        <div class="dialogue-area">
            <div class="dialogue-box">
                <div class="dialogue-header">
                    <div style="display:flex; align-items:center; gap:0.5rem;">
                        <span class="dialogue-name" id="dialogue-name">角色</span>
                        <span class="emotion-tag" style="display:none"></span>
                        <span class="dialogue-indicator"></span>
                    </div>
                    <button id="btn-expand-dialogue"
                        style="background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size:0.9rem; transition:color 0.2s;">▲
                        展开记录</button>
                </div>
                <div class="dialogue-content">
                    <div class="dialogue-text"></div>
                    <div class="dialogue-history" id="dialogue-history" style="display:none;"></div>
                </div>
                <div class="click-continue" style="display:none">▼ 点击继续</div>
                <!-- Input Area inside dialogue box -->
                <div class="input-area">
                    <input type="text" id="chat-input" placeholder="输入你想说的话..." autocomplete="off">
                    <button class="send-btn" id="btn-send" title="发送">➤</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Live2D SDK & Dependencies (CDN) -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

    <!-- App Scripts -->
    <script src="/static/js/live2d-helper.js?v=16"></script>
    <script src="/static/js/chat.js?v=18"></script>
</body>

</html>
